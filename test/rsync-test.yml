---
# Tests for default rsync strategy
- name: Given no previous deploy
  hosts: all
  vars:
    ansistrano_deploy_to: "/tmp/my-app.com"
  tasks:
    - name: Assert ansistrano_deploy_to path does not exist
      stat:
        path: "{{ ansistrano_deploy_to }}"
      register: st
    - debug:
        msg: "Path does not exist and is a directory"
      when: st.stat.exists is defined and not st.stat.exists

- name: When deploying
  hosts: all
  vars:
    ansistrano_deploy_to: "/tmp/my-app.com"
    ansistrano_after_setup_tasks_file: "{{ playbook_dir }}/tasks/create-shared-paths.yml"
    ansistrano_after_update_code_tasks_file: "{{ playbook_dir }}/tasks/create-internal-paths.yml"
    ansistrano_shared_paths:
      - blah
      - foo/bar
      - xxx/yyy/zzz
    ansistrano_shared_files:
      - test.txt
      - files/test.txt
  roles:
    - { role: local-ansistrano }

- name: Then a successful deploy with rsync should be done
  hosts: all
  vars:
    ansistrano_deploy_to: "/tmp/my-app.com"
  tasks:
    - name: Assert ansistrano_deploy_to path does exist
      stat:
        path: "{{ ansistrano_deploy_to }}"
      register: st
    - debug:
        msg: "Path exists and is a directory"
      when: st.stat.exists is defined and st.stat.exists
    - name: Assert ansistrano_deploy_to/current path does exist
      stat:
        path: "{{ ansistrano_deploy_to }}/current"
      register: st
    - name: Trigger error due to path is not a symlink
      fail:
        msg: "Path is not a symlink"
      when: st.stat.exists is defined and st.stat.exists and not st.stat.islnk
    - debug:
        msg: "Path exists and is a symlink"
      when: st.stat.exists is defined and st.stat.exists and st.stat.islnk

- name: And I should be able to do a second deploy
  hosts: all
  vars:
    ansistrano_deploy_to: "/tmp/my-app.com"
    ansistrano_after_setup_tasks_file: "{{ playbook_dir }}/tasks/create-shared-paths.yml"
    ansistrano_after_update_code_tasks_file: "{{ playbook_dir }}/tasks/create-internal-paths.yml"
    ansistrano_shared_paths:
      - blah
      - foo/bar
      - xxx/yyy/zzz
    ansistrano_shared_files:
      - test.txt
      - files/test.txt
  roles:
    - { role: local-ansistrano }

- name: When deploying with release cleanup enabled
  hosts: all
  vars:
    ansistrano_deploy_to: "/tmp/cleanup-my-app.com"
  pre_tasks:
    - name: Set the first fixed release version
      set_fact:
        ansistrano_release_version: "20000101000000Z"
        ansistrano_keep_releases: 1
  roles:
    - { role: local-ansistrano }

- name: And deploying a newer release with release cleanup enabled
  hosts: all
  vars:
    ansistrano_deploy_to: "/tmp/cleanup-my-app.com"
  pre_tasks:
    - name: Set the second fixed release version
      set_fact:
        ansistrano_release_version: "20000101000001Z"
        ansistrano_keep_releases: 1
  roles:
    - { role: local-ansistrano }

- name: Then only the newest release should remain
  hosts: all
  vars:
    ansistrano_deploy_to: "/tmp/cleanup-my-app.com"
  tasks:
    - name: Assert the oldest release was removed
      stat:
        path: "{{ ansistrano_deploy_to }}/releases/20000101000000Z"
      register: old_release

    - name: Assert the newest release still exists
      stat:
        path: "{{ ansistrano_deploy_to }}/releases/20000101000001Z"
      register: new_release

    - name: Assert current points to the newest release
      stat:
        path: "{{ ansistrano_deploy_to }}/current"
      register: current_release

    - name: Assert old release was removed and newest release kept
      assert:
        that:
          - old_release.stat.exists is defined and not old_release.stat.exists
          - new_release.stat.exists is defined and new_release.stat.exists
          - current_release.stat.islnk is defined and current_release.stat.islnk
          - current_release.stat.lnk_target == "./releases/20000101000001Z"

- name: When deploying fails before symlink
  hosts: all
  vars:
    ansistrano_release_version: "99999999999999Z"
    ansistrano_deploy_to: "/tmp/my-app.com"
    ansistrano_after_setup_tasks_file: "{{ playbook_dir }}/tasks/create-shared-paths.yml"
    ansistrano_after_update_code_tasks_file: "{{ playbook_dir }}/tasks/create-internal-paths.yml"
    ansistrano_before_symlink_tasks_file: "{{ playbook_dir }}/tasks/fail-before-symlink.yml"
    ansistrano_shared_paths:
      - blah
      - foo/bar
      - xxx/yyy/zzz
    ansistrano_shared_files:
      - test.txt
      - files/test.txt
  ignore_errors: yes
  roles:
    - { role: local-ansistrano }

- name: Then the failed release should be cleaned up
  hosts: all
  vars:
    ansistrano_deploy_to: "/tmp/my-app.com"
    ansistrano_release_version: "99999999999999Z"
  tasks:
    - name: Assert failed release path does not exist
      stat:
        path: "{{ ansistrano_deploy_to }}/releases/{{ ansistrano_release_version }}"
      register: st
    - debug:
        msg: "Failed release path was cleaned up"
      when: st.stat.exists is defined and not st.stat.exists

# Tests for rsync strategy with "current" via rsync (instead of the default symlink)
- name: When deploying with rsync current strategy
  hosts: all
  vars:
    ansistrano_deploy_to: "/tmp/my-app.com"
    ansistrano_after_setup_tasks_file: "{{ playbook_dir }}/tasks/create-shared-paths.yml"
    ansistrano_after_update_code_tasks_file: "{{ playbook_dir }}/tasks/create-internal-paths.yml"
    ansistrano_current_via: "rsync"
    ansistrano_shared_paths:
      - blah
      - foo/bar
      - xxx/yyy/zzz
    ansistrano_shared_files:
      - test.txt
      - files/test.txt
  roles:
    - { role: local-ansistrano }

- name: Then a successful deploy with rsync should be done
  hosts: all
  vars:
    ansistrano_deploy_to: "/tmp/my-app.com"
  tasks:
    - name: Assert ansistrano_deploy_to path does exist
      stat:
        path: "{{ ansistrano_deploy_to }}"
      register: st
    - debug:
        msg: "Path exists and is a directory"
      when: st.stat.exists is defined and st.stat.exists
    - name: Assert ansistrano_deploy_to/current path does exist
      stat:
        path: "{{ ansistrano_deploy_to }}/current"
      register: st
    - name: Trigger error due to path is not a directory
      fail:
        msg: "Path is not a directory"
      when: st.stat.exists is defined and st.stat.exists and not st.stat.isdir
    - debug:
        msg: "Path exists and is a directory"
      when: st.stat.exists is defined and st.stat.exists and st.stat.isdir

- name: And I should be able to do a second deploy
  hosts: all
  vars:
    ansistrano_deploy_to: "/tmp/my-app.com"
    ansistrano_after_setup_tasks_file: "{{ playbook_dir }}/tasks/create-shared-paths.yml"
    ansistrano_after_update_code_tasks_file: "{{ playbook_dir }}/tasks/create-internal-paths.yml"
    ansistrano_current_via: "rsync"
    ansistrano_shared_paths:
      - blah
      - foo/bar
      - xxx/yyy/zzz
    ansistrano_shared_files:
      - test.txt
      - files/test.txt
  roles:
    - { role: local-ansistrano }
