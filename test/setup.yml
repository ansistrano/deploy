---
- name: Basic setup for Ansible to run properly
  hosts: all

  pre_tasks:
    - name: Update apt cache.
      command: apt -y update
      when: update_cache is defined

  tasks:
    - name: Install required packages
      apt:
        name:
          - rsync
          - tar
          - ssh
          - git
          - unzip
          - subversion
          - mercurial
        state: present
