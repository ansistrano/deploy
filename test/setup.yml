---
- name: Basic setup for Ansible to run properly
  hosts: all

  pre_tasks:
    - name: Update apt cache.
      command: apt -y update
      when: update_cache is defined

  tasks:

    - name: Check Ansible Is Installed
      changed_when: False
      command: /usr/bin/env ansible-playbook --version

    - name: Install required packages
      apt:
        name:
          - rsync
          - tar
          - ssh
          - git
          - unzip
          - subversion
          - mercurial
        state: present
