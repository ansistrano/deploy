---
# Tests for download strategy
- name: Given no previous deploy with download strategy
  hosts: all
  vars:
    ansistrano_deploy_to: "/tmp/download/my-app.com"
  tasks:
    - name: Assert ansistrano_deploy_to path does not exist
      stat:
        path: "{{ ansistrano_deploy_to }}"
      register: st
    - debug:
        msg: "Path does not exist and is a directory"
      when: st.stat.exists is defined and not st.stat.exists

- name: When deploying using download strategy
  hosts: all
  vars:
    ansistrano_deploy_via: "download_unarchive"
    ansistrano_get_url: https://github.com/ansistrano/deploy/archive/master.zip
    ansistrano_deploy_to: "/tmp/download/my-app.com"
  roles:
    - { role: local-ansistrano }

- name: Then a successful deploy with download strategy should be done
  hosts: all
  vars:
    ansistrano_deploy_to: "/tmp/download/my-app.com"
  tasks:
    - name: Assert ansistrano_deploy_to path does exist
      stat:
        path: "{{ ansistrano_deploy_to }}"
      register: st
    - debug:
        msg: "Path exists and is a directory"
      when: st.stat.exists is defined and st.stat.exists

- name: And I should be able to do a second deploy
  hosts: all
  vars:
    ansistrano_deploy_via: "download_unarchive"
    ansistrano_get_url: https://github.com/ansistrano/deploy/archive/master.zip
    ansistrano_deploy_to: "/tmp/download/my-app.com"
  roles:
    - { role: local-ansistrano }

- name: When deploying using download strategy and setting owner and group user
  hosts: all
  vars:
    ansistrano_deploy_via: "download_unarchive"
    ansistrano_get_url: https://github.com/ansistrano/deploy/archive/master.zip
    ansistrano_deploy_to: "/tmp/download/nobody"
    ansistrano_unarchive_owner: "unarchive_user"
    ansistrano_unarchive_group: "unarchive_group"
  roles:
    - { role: local-ansistrano }
  pre_tasks:
    - name: Create group to use in the test
      group:
        name: unarchive_group
        state: present

    - name: Create user to use in the test
      user:
        name: unarchive_user
        uid: 6666
        groups: unarchive_group

  post_tasks:
    - name: Assert ansistrano_release_path.stdout/deploy-master is owned by unarchive_user
      stat:
        path: "{{ ansistrano_release_path.stdout }}/deploy-master"
      register: st
    - debug:
        msg: "ansistrano_release_path.stdout/deploy-master is owned by unarchive_user"
      when: st.stat.gr_name == "unarchive_group" and st.stat.pw_name == "unarchive_user"

- name: When deploying using download strategy and setting owner (expect fail)
  hosts: all
  vars:
    ansistrano_deploy_via: "download_unarchive"
    ansistrano_get_url: https://github.com/ansistrano/deploy/archive/master.zip
    ansistrano_deploy_to: "/tmp/download/fail"
    ansistrano_unarchive_owner: "unarchive_user"
  ignore_errors: yes
  roles:
    - { role: local-ansistrano }
  post_tasks:
    - name: Assert ansistrano_release_path.stdout/deploy-master does not exist
      stat:
        path: "{{ ansistrano_release_path.stdout }}/deploy-master"
      register: st
    - debug:
        msg: "ansistrano_release_path.stdout/deploy-master does not exist"
      when: st.stat.exists is sameas false

- name: When deploying using download strategy and a very long url + querystring
  hosts: all
  vars:
    ansistrano_deploy_via: "download_unarchive"
    ansistrano_get_url: https://github.com/ansistrano/deploy/archive/master.zip?Content-Disposition=attachment-filename-frontend-v0.2.2.tar.gz&X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Credential=admin%2F20210314%2F%2Fs3%2Faws4_request&X-Amz-Date=20210314T094726Z&X-Amz-Expires=432000&X-Amz-SignedHeaders=host&X-Amz-Signature=edca67e9117c6e984a15b61fcac0f7617900e32f33a38d23eb71d795872572f8
    ansistrano_deploy_to: "/tmp/download/fail"
    ansistrano_unarchive_owner: "unarchive_user"
  ignore_errors: yes
  roles:
    - { role: local-ansistrano }
  post_tasks:
    - name: Assert ansistrano_release_path.stdout/deploy-master does not exist
      stat:
        path: "{{ ansistrano_release_path.stdout }}/deploy-master"
      register: st
    - debug:
        msg: "ansistrano_release_path.stdout/deploy-master does not exist"
      when: st.stat.exists is sameas false

- name: Given a local artifact endpoint with filename only in Content-Disposition
  hosts: all
  vars:
    ansistrano_fixture_download_root: "/tmp/ansistrano-download-fixture"
    ansistrano_fixture_download_port: 18080
  tasks:
    - name: Remove previous download fixture directory
      file:
        path: "{{ ansistrano_fixture_download_root }}"
        state: absent

    - name: Create download fixture directory
      file:
        path: "{{ ansistrano_fixture_download_root }}/artifact"
        state: directory

    - name: Create download fixture file
      copy:
        dest: "{{ ansistrano_fixture_download_root }}/artifact/README.txt"
        content: "download fixture via content disposition\n"

    - name: Create zipped download fixture
      archive:
        path: "{{ ansistrano_fixture_download_root }}/artifact"
        dest: "{{ ansistrano_fixture_download_root }}/artifact.zip"
        format: zip

    - name: Create HTTP fixture server
      copy:
        dest: "{{ ansistrano_fixture_download_root }}/server.py"
        mode: "0755"
        content: |
          from http.server import BaseHTTPRequestHandler, HTTPServer
          from pathlib import Path
          from urllib.parse import urlparse

          root = Path("{{ ansistrano_fixture_download_root }}")
          payload = (root / "artifact.zip").read_bytes()

          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if urlparse(self.path).path != "/download":
                      self.send_response(404)
                      self.end_headers()
                      return

                  self.send_response(200)
                  self.send_header("Content-Type", "application/zip")
                  self.send_header(
                      "Content-Disposition",
                      'attachment; filename="artifact.zip"',
                  )
                  self.send_header("Content-Length", str(len(payload)))
                  self.end_headers()
                  self.wfile.write(payload)

              def log_message(self, format, *args):
                  return

          HTTPServer(("127.0.0.1", {{ ansistrano_fixture_download_port }}), Handler).serve_forever()

    - name: Start HTTP fixture server
      shell: >-
        python3 {{ ansistrano_fixture_download_root }}/server.py
        > {{ ansistrano_fixture_download_root }}/server.log 2>&1
        & echo $! > {{ ansistrano_fixture_download_root }}/server.pid
      args:
        creates: "{{ ansistrano_fixture_download_root }}/server.pid"

    - name: Wait for HTTP fixture server
      wait_for:
        host: "127.0.0.1"
        port: "{{ ansistrano_fixture_download_port }}"
        timeout: 10

- name: When deploying using download strategy and a /download endpoint with querystring
  hosts: all
  vars:
    ansistrano_deploy_via: "download_unarchive"
    ansistrano_get_url: "http://127.0.0.1:18080/download?job=build:staging"
    ansistrano_deploy_to: "/tmp/download/content-disposition"
  roles:
    - { role: local-ansistrano }

- name: Then the content-disposition download strategy should be unarchived successfully
  hosts: all
  vars:
    ansistrano_deploy_to: "/tmp/download/content-disposition"
  tasks:
    - name: Assert downloaded archive was extracted
      stat:
        path: "{{ ansistrano_deploy_to }}/current/artifact/README.txt"
      register: st
    - debug:
        msg: "Content-Disposition artifact was downloaded and extracted"
      when: st.stat.exists is defined and st.stat.exists

- name: Clean up local download fixture server
  hosts: all
  vars:
    ansistrano_fixture_download_root: "/tmp/ansistrano-download-fixture"
  tasks:
    - name: Stop HTTP fixture server
      shell: kill "$(cat {{ ansistrano_fixture_download_root }}/server.pid)"
      args:
        removes: "{{ ansistrano_fixture_download_root }}/server.pid"

    - name: Remove download fixture directory
      file:
        path: "{{ ansistrano_fixture_download_root }}"
        state: absent
